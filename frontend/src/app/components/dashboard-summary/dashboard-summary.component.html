<section class="summary-grid">
  <article class="summary-card">
    <span>Total Polls</span>
    <strong>{{ totalPolls }}</strong>
  </article>

  <article class="summary-card">
    <span>Total Votes</span>
    <strong>{{ totalVotes }}</strong>
  </article>

  <article class="summary-card">
    <span>Your Voted Polls</span>
    <strong>{{ votedPolls }}</strong>
  </article>

  <article class="summary-card summary-wide">
    <span>Most Active Poll</span>
    <strong>{{ mostActivePoll }}</strong>
  </article>
</section>
