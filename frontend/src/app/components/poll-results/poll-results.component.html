<section class="results">
  <div class="results-header">
    <span>Results</span>
    <strong>{{ totalVotes }} total votes</strong>
  </div>

  <div class="bar-list">
    @for (option of poll.options; track option.voteOption) {
      <div class="bar-row">
        <div class="bar-meta">
          <span>{{ option.voteOption }}</span>
          <strong>{{ option.voteCount }} votes</strong>
        </div>
        <div class="bar-track" aria-hidden="true">
          <div class="bar-fill" [style.width.%]="getPercentage(option.voteCount)"></div>
        </div>
        <p>{{ getPercentage(option.voteCount) }}%</p>
      </div>
    }
  </div>
</section>
