<section class="detail-shell">
  <div class="detail-actions">
    <a class="back-link" routerLink="/polls">&lt; Back to polls</a>
    <button type="button" class="refresh-link" (click)="refreshPoll()">Refresh result</button>
  </div>

  @if (loading && !poll) {
    <app-loading-spinner message="Loading poll..." />
  }

  @if (error) {
    <app-error-message [message]="error" />
  }

  @if (poll) {
    <app-poll-card
      [poll]="poll"
      [votingKey]="votingKey"
      [hasVoted]="hasVoted()"
      [votedOptionIndex]="getVotedOptionIndex()"
      (vote)="vote($event.pollId, $event.optionIndex)"
    />
  }
</section>
