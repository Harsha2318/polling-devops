<section class="detail-shell">
  <div class="detail-actions">
    <div class="detail-meta">
      <a class="back-link" routerLink="/polls">&lt; Back to polls</a>
      <p class="live-note">
        @if (refreshing) { Syncing live poll... } @else { Live updates every 4 seconds. }
      </p>
    </div>
    <div class="button-row">
      <button type="button" class="refresh-link" (click)="refreshPoll()">Refresh</button>
      <button type="button" class="close-link" (click)="closePoll()" [disabled]="closing || poll?.status === 'CLOSED'">
        @if (closing) { Closing poll... } @else { Close Poll }
      </button>
      <button type="button" class="delete-link" (click)="deletePoll()" [disabled]="deleting">
        @if (deleting) { Deleting poll... } @else { Delete Poll }
      </button>
    </div>
  </div>

  @if (loading && !poll) {
    <app-loading-spinner message="Loading poll..." />
  }

  @if (error) {
    <app-error-message [message]="error" />
  }

  @if (poll) {
    <app-poll-card
      [poll]="poll"
      [hasVoted]="hasVoted()"
      [votingKey]="votingKey"
      [showMeta]="true"
      (vote)="vote($event)"
    />
  }
</section>
